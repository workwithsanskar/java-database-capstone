<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Doctor</title>
    <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<main class="shell">
    <div class="card">
        <div class="eyebrow">Patient Portal</div>
        <h1>Search Doctors</h1>
        <form class="grid-2">
            <label>Doctor Name
                <input type="text" value="Anika">
            </label>
            <label>Speciality
                <input type="text" value="Cardiology">
            </label>
        </form>
        <table class="table">
            <thead>
            <tr>
                <th>Doctor</th>
                <th>Speciality</th>
                <th>Available Slot</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Dr. Anika Sharma</td>
                <td>Cardiology</td>
                <td><span class="badge">11:00 AM</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
